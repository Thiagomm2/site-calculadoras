<!DOCTYPE html>
<html>
<head>
  <title>Calculadora de Salário Líquido</title>
</head>
<body>

  <h1>Calculadora de Salário Líquido</h1>

  <label>Salário bruto (R$):</label>
  <input type="number" id="salario" />

  <br><br>

  <button onclick="calcular()">Calcular</button>

  <h2 id="resultado"></h2>

  <script>
    function calcular() {
      let salario = parseFloat(document.getElementById("salario").value);

      if (!salario) {
        document.getElementById("resultado").innerText = "Digite um valor válido.";
        return;
      }

      // INSS simplificado (aproximação)
      let inss = salario * 0.08;

      // IR simplificado
      let base = salario - inss;
      let ir = 0;

      if (base > 4664) {
        ir = base * 0.275;
      } else if (base > 3751) {
        ir = base * 0.225;
      } else if (base > 2826) {
        ir = base * 0.15;
      } else if (base > 1903) {
        ir = base * 0.075;
      }

      let liquido = salario - inss - ir;

      document.getElementById("resultado").innerText =
        "Salário líquido aproximado: R$ " + liquido.toFixed(2);
    }
  </script>

</body>
</html>
