<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Salário Líquido</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg">

    <h1 class="text-2xl font-bold mb-4 text-gray-800">
      Calculadora de Salário Líquido
    </h1>

    <p class="text-gray-600 mb-6">
      Descubra quanto você recebe após descontos de INSS e Imposto de Renda.
    </p>

    <div class="mb-4">
      <label class="block text-gray-700 mb-2">Salário bruto (R$)</label>
      <input 
        type="number" 
        id="salario" 
        placeholder="Ex: 5000"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <button 
      onclick="calcular()"
      class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition"
    >
      Calcular
    </button>

    <div id="resultado-box" class="mt-6 hidden p-4 bg-green-100 rounded-lg">
      <h2 class="text-lg font-semibold text-green-800">
        Resultado:
      </h2>
      <p id="resultado" class="text-xl font-bold text-green-900 mt-2"></p>
    </div>

  </div>

  <script>
    function calcular() {
      let salario = parseFloat(document.getElementById("salario").value);

      if (!salario) {
        alert("Digite um valor válido.");
        return;
      }

      let inss = salario * 0.08;
      let base = salario - inss;
      let ir = 0;

      if (base > 4664) {
        ir = base * 0.275;
      } else if (base > 3751) {
        ir = base * 0.225;
      } else if (base > 2826) {
        ir = base * 0.15;
      } else if (base > 1903) {
        ir = base * 0.075;
      }

      let liquido = salario - inss - ir;

      document.getElementById("resultado").innerText =
        "R$ " + liquido.toFixed(2);

      document.getElementById("resultado-box").classList.remove("hidden");
    }
  </script>

</body>
</html>
